<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Video Interactivo</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:Arial,sans-serif;
}

/* =========================
   APP
========================= */

.app{
  position:fixed;
  inset:0;

  width:100%;
  height:100%;

  overflow:hidden;

  background:black;
}

/* =========================
   VIDEO
========================= */

video{
  position:fixed;
  inset:0;

  width:100%;
  height:100vh;
  height:100dvh;

  object-fit:contain;

  background:black;
}

/* =========================
   MOBILE PORTRAIT
   ROTAR TODA LA INTERFAZ
========================= */

@media (hover:none) and (orientation:portrait){

  body{
    overflow:hidden;
  }

  .app{

    width:100vh;
    height:100vw;

    top:50%;
    left:50%;

    transform:
      translate(-50%, -50%)
      rotate(90deg);

    transform-origin:center center;
  }

  video{
    width:100%;
    height:100%;

    object-fit:contain;
  }
}

/* =========================
   OVERLAY
========================= */

.overlay{
  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  pointer-events:none;

  z-index:2;
}

/* =========================
   BOTONES OPCIONES
========================= */

.buttons{
  display:none;

  gap:clamp(10px,2vw,22px);

  pointer-events:all;

  flex-wrap:wrap;
  justify-content:center;

  padding:0 clamp(10px,4vw,40px);

  max-width:100%;
}

/* =========================
   ESTILO GENERAL BOTONES
========================= */

button{
  position:relative;
  overflow:hidden;

  padding:
    clamp(10px,1.6vh,14px)
    clamp(16px,2.5vw,28px);

  font-size:clamp(13px,2vw,16px);
  font-weight:600;
  letter-spacing:0.4px;

  border-radius:16px;
  border:1px solid rgba(255,255,255,0.18);

  cursor:pointer;

  color:white;

  background:
    linear-gradient(
      180deg,
      rgba(40,40,40,0.92),
      rgba(12,12,12,0.88)
    );

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  box-shadow:
    0 8px 28px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.05);

  transition:
    transform 0.18s ease,
    background 0.18s ease,
    box-shadow 0.18s ease,
    border-color 0.18s ease;
}

button::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.05),
      rgba(255,255,255,0)
    );

  pointer-events:none;
}

button:hover{
  transform:translateY(-2px) scale(1.03);

  background:
    linear-gradient(
      180deg,
      rgba(55,55,55,0.96),
      rgba(20,20,20,0.92)
    );

  border-color:rgba(255,255,255,0.24);

  box-shadow:
    0 12px 34px rgba(0,0,0,0.55),
    0 0 18px rgba(255,255,255,0.05);
}

button:active{
  transform:scale(0.98);
}

/* =========================
   BOTONES OPCIONES
========================= */

.buttons button{
  min-width:clamp(90px,13vw,150px);

  padding:
    clamp(12px,2vh,18px)
    clamp(20px,3vw,36px);

  font-size:clamp(14px,2.2vw,18px);

  border-radius:20px;
}

/* =========================
   START SCREEN
========================= */

#startScreen{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.75);

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:5;
}

#startScreen button{
  padding:
    clamp(14px,2vh,20px)
    clamp(34px,5vw,58px);

  font-size:clamp(17px,3vw,24px);

  border-radius:22px;
}

/* =========================
   CONTROLES VIDEO
========================= */

#controls{
  position:fixed;

  bottom:clamp(10px,2vh,20px);
  left:clamp(10px,2vw,20px);

  z-index:3;

  display:flex;
  gap:10px;
}

#controls button{
  width:48px;
  height:48px;

  padding:0;

  border-radius:50%;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:18px;
}

/* =========================
   VOLUMEN
========================= */

#volumeControl{
  position:fixed;

  bottom:clamp(10px,2vh,20px);
  right:max(env(safe-area-inset-right),10px);

  z-index:50;

  display:none;
}

#volumeWrapper{
  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;
}

#muteBtn{
  width:50px;
  height:50px;

  border-radius:50%;
  padding:0;

  font-size:18px;
}

#volumeSlider{
  position:absolute;

  bottom:78px;
  left:50%;

  transform:
    translateX(-50%)
    rotate(-90deg);

  width:120px;
  height:6px;

  opacity:0;
  pointer-events:none;

  accent-color:white;

  transition:
    opacity 0.2s ease,
    transform 0.2s ease;
}

#volumeWrapper:hover #volumeSlider,
#volumeWrapper:focus-within #volumeSlider{
  opacity:1;
  pointer-events:auto;

  transform:
    translateX(-50%)
    rotate(-90deg)
    scale(1);
}

@media (hover:none){
  #volumeSlider{
    opacity:1;
    pointer-events:auto;
  }
}

/* =========================
   BOTONES FINALES
========================= */

#finalButton,
#restartFlowButton{
  position:relative;

  width:76px;
  height:76px;

  padding:0;

  border-radius:50%;

  display:none;
  justify-content:center;
  align-items:center;

  pointer-events:all;

  background:
    linear-gradient(
      180deg,
      rgba(15,15,15,0.92),
      rgba(0,0,0,0.82)
    );

  border:1px solid rgba(255,255,255,0.14);

  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);

  box-shadow:
    0 12px 32px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.04);

  color:white;
}

#finalButton{
  margin-bottom:14px;
}

#finalButton:hover,
#restartFlowButton:hover{
  transform:translateY(-4px) scale(1.06);

  background:
    linear-gradient(
      180deg,
      rgba(25,25,25,0.96),
      rgba(10,10,10,0.90)
    );

  border-color:rgba(255,255,255,0.22);
}

#finalButton svg{
  width:38px;
  height:38px;

  filter:
    drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}

#restartFlowButton{
  font-size:34px;
  font-weight:700;
}

/* =========================
   MOBILE
========================= */

@media (max-width:600px){

  #controls button,
  #muteBtn{
    width:44px;
    height:44px;
    font-size:16px;
  }

  .buttons{
    gap:12px;
  }

  #finalButton,
  #restartFlowButton{
    width:68px;
    height:68px;
  }

  #finalButton svg{
    width:34px;
    height:34px;
  }

  #restartFlowButton{
    font-size:30px;
  }
}

</style>
</head>

<body>

<div class="app">

  <!-- VIDEO -->
  <video
    id="video"
    muted
    playsinline
  ></video>

  <!-- START -->
  <div id="startScreen">

    <button onclick="start()">
      Iniciar
    </button>

  </div>

  <!-- OVERLAY -->
  <div class="overlay">

    <!-- OPCIONES -->
    <div class="buttons" id="options">

      <button onclick="playVideo('Rough_Agite.mp4')">
        Agité
      </button>

      <button onclick="playVideo('Rough_OFicinaCentral.mp4')">
        Oficina
      </button>

      <button onclick="playVideo('Rough_PequenoTeatro.mp4')">
        Teatro
      </button>

    </div>

    <!-- TIKTOK -->
    <button
      id="finalButton"
      onclick="goToLink()"
      aria-label="TikTok"
    >

      <svg
        viewBox="0 0 24 24"
        fill="currentColor"
      >
        <path d="M12.75 2h2.25c.2 1.9 1.7 3.4 3.6 3.6v2.3c-1.3-.1-2.5-.5-3.6-1.2v7.4c0 3.2-2.6 5.8-5.8 5.8s-5.8-2.6-5.8-5.8 2.6-5.8 5.8-5.8c.3 0 .6 0 .9.1v2.4c-.3-.1-.6-.2-.9-.2-1.9 0-3.4 1.5-3.4 3.4s1.5 3.4 3.4 3.4 3.4-1.5 3.4-3.4V2z"/>
      </svg>

    </button>

    <!-- RESTART -->
    <button
      id="restartFlowButton"
      onclick="restartFlow()"
      aria-label="Reiniciar"
    >
      ↻
    </button>

  </div>

  <!-- CONTROLES -->
  <div id="controls">

    <button onclick="restartVideo()">
      ⏮
    </button>

    <button onclick="togglePlay()">
      ⏯
    </button>

    <button
      id="skipBtn"
      onclick="skip()"
    >
      ⏭
    </button>

  </div>

  <!-- VOLUMEN -->
  <div id="volumeControl">

    <div id="volumeWrapper">

      <input
        type="range"
        id="volumeSlider"
        min="0"
        max="1"
        step="0.05"
        value="1"
        oninput="setVolume(this.value)"
      >

      <button
        id="muteBtn"
        onclick="toggleMute()"
      >
        🔊
      </button>

    </div>

  </div>

</div>

<script>

const video =
  document.getElementById("video");

const options =
  document.getElementById("options");

const finalButton =
  document.getElementById("finalButton");

const restartFlowButton =
  document.getElementById("restartFlowButton");

const startScreen =
  document.getElementById("startScreen");

const skipBtn =
  document.getElementById("skipBtn");

const volumeControl =
  document.getElementById("volumeControl");

const muteBtn =
  document.getElementById("muteBtn");

const volumeSlider =
  document.getElementById("volumeSlider");

let isIntro = true;
let introCompleted = false;
let skipping = false;

/* =========================
   START
========================= */

function start(){

  startScreen.style.display = "none";

  video.muted = false;
  video.volume = 1;

  volumeControl.style.display = "block";

  loadVideo(
    "Color_Intro_TODO.mp4",
    true
  );
}

/* =========================
   LOAD VIDEO
========================= */

function loadVideo(src, intro = false){

  isIntro = intro;
  introCompleted = false;

  video.pause();

  video.src = src;

  video.load();

  setTimeout(() => {

    video.currentTime = 0;

    video.play().catch(() => {});

  },100);
}

/* =========================
   VIDEO END
========================= */

video.addEventListener("ended", () => {

  if(skipping) return;

  if(isIntro){

    introCompleted = true;

    skipBtn.style.display = "none";

    options.style.display = "flex";

  }else{

    skipBtn.style.display = "none";

    finalButton.style.display = "flex";

    restartFlowButton.style.display =
      "flex";
  }
});

/* =========================
   PLAY OPTION
========================= */

function playVideo(src){

  options.style.display = "none";

  finalButton.style.display = "none";

  restartFlowButton.style.display =
    "none";

  skipBtn.style.display = "block";

  loadVideo(src,false);
}

/* =========================
   PLAY / PAUSE
========================= */

function togglePlay(){

  if(!video.src) return;

  if(video.paused){

    video.play().catch(() => {});

  }else{

    video.pause();
  }
}

/* =========================
   RESTART VIDEO
========================= */

function restartVideo(){

  if(!video.src) return;

  options.style.display = "none";

  finalButton.style.display = "none";

  restartFlowButton.style.display =
    "none";

  skipBtn.style.display = "block";

  if(isIntro){
    introCompleted = false;
  }

  video.currentTime = 0;

  video.play().catch(() => {});
}

/* =========================
   SKIP
========================= */

function skip(){

  if(isIntro && !introCompleted){

    skipping = true;

    introCompleted = true;

    video.pause();

    if(video.duration &&
       isFinite(video.duration)){

      video.currentTime =
        video.duration;
    }

    skipBtn.style.display = "none";

    options.style.display = "flex";

    setTimeout(() => {
      skipping = false;
    },300);

  }else if(!isIntro){

    skipping = true;

    video.pause();

    if(video.duration &&
       isFinite(video.duration)){

      video.currentTime =
        video.duration;
    }

    skipBtn.style.display = "none";

    finalButton.style.display = "flex";

    restartFlowButton.style.display =
      "flex";

    setTimeout(() => {
      skipping = false;
    },300);
  }
}

/* =========================
   RESTART FLOW
========================= */

function restartFlow(){

  options.style.display = "none";

  finalButton.style.display = "none";

  restartFlowButton.style.display =
    "none";

  skipBtn.style.display = "block";

  isIntro = true;

  introCompleted = false;

  loadVideo(
    "Color_Intro_TODO.mp4",
    true
  );
}

/* =========================
   LINK
========================= */

function goToLink(){

  window.open(
    "https://www.tiktok.com/@escenas_inhabitadas?_r=1&_t=ZS-95hnxZTzgVZ",
    "_blank"
  );
}

/* =========================
   VOLUME
========================= */

function toggleMute(){

  video.muted = !video.muted;

  muteBtn.textContent =
    video.muted
    ? "🔇"
    : "🔊";

  if(!video.muted){
    volumeSlider.value =
      video.volume;
  }
}

function setVolume(val){

  const v = parseFloat(val);

  video.volume = v;

  video.muted = v === 0;

  muteBtn.textContent =
    v === 0
    ? "🔇"
    : "🔊";
}

</script>

</body>
</html>
