<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Video Interactivo</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    object-fit: contain;
  }

  .overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    pointer-events: none;
    z-index: 2;
  }

  .buttons {
    display: none;
    gap: clamp(8px, 2vw, 20px);
    pointer-events: all;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 clamp(10px, 4vw, 40px);
    max-width: 100%;
  }

  .buttons button {
    padding: clamp(10px, 1.8vh, 16px) clamp(16px, 3vw, 32px);
    font-size: clamp(13px, 2.2vw, 18px);
    border-radius: 14px;
    border: 2px solid white;
    cursor: pointer;
    background: rgba(0, 0, 0, 0.75);
    color: white;
    box-shadow: 0 6px 25px rgba(0,0,0,0.6);
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
    transition: 0.25s;
    min-width: clamp(70px, 12vw, 120px);
  }

  .buttons button:hover {
    background: white;
    color: black;
    transform: scale(1.08);
  }

  #finalButton {
    display: none;
    margin-top: clamp(12px, 2vh, 20px);
    pointer-events: all;
    padding: clamp(10px, 1.8vh, 16px) clamp(16px, 3vw, 32px);
    font-size: clamp(13px, 2.2vw, 18px);
    border-radius: 14px;
    border: 2px solid white;
    cursor: pointer;
    background: rgba(0, 0, 0, 0.75);
    color: white;
    box-shadow: 0 6px 25px rgba(0,0,0,0.6);
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
    align-items: center;
    gap: 10px;
    transition: 0.25s;
  }

  #finalButton:hover {
    background: white;
    color: black;
    transform: scale(1.08);
  }

  #restartFlowButton {
    display: none;
    margin-top: clamp(6px, 1vh, 10px);
    pointer-events: all;
    padding: clamp(10px, 1.8vh, 16px) clamp(16px, 3vw, 32px);
    font-size: clamp(13px, 2.2vw, 18px);
    border-radius: 14px;
    border: 2px solid white;
    cursor: pointer;
    background: rgba(0, 0, 0, 0.75);
    color: white;
    box-shadow: 0 6px 25px rgba(0,0,0,0.6);
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
    transition: 0.25s;
  }

  #restartFlowButton:hover {
    background: white;
    color: black;
    transform: scale(1.08);
  }

  button {
    padding: clamp(8px, 1.5vh, 12px) clamp(12px, 2.2vw, 25px);
    font-size: clamp(13px, 2vw, 16px);
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: 0.2s;
  }

  button:hover {
    background: rgba(255,255,255,0.4);
  }

  #startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 5;
  }

  #startScreen button {
    padding: clamp(12px, 2vh, 18px) clamp(28px, 5vw, 52px);
    font-size: clamp(16px, 3vw, 22px);
    border-radius: 12px;
    border: 2px solid white;
    background: rgba(255,255,255,0.2);
    color: white;
  }

  #controls {
    position: fixed;
    bottom: clamp(10px, 2vh, 20px);
    left: clamp(10px, 2vw, 20px);
    z-index: 3;
    display: flex;
    gap: clamp(6px, 1vw, 10px);
  }

  /* CONTROL DE VOLUMEN */
  #volumeControl {
    position: fixed;
    bottom: clamp(10px, 2vh, 20px);
    right: max(env(safe-area-inset-right), 10px);
    z-index: 50;
    display: none;
  }

  #volumeWrapper {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #muteBtn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    padding: 0;
    font-size: 18px;
    background: rgba(0,0,0,0.75);
    border: 2px solid rgba(255,255,255,0.9);
    backdrop-filter: blur(6px);
    color: white;
    cursor: pointer;
  }

  #volumeSlider {
    position: absolute;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%) rotate(-90deg);

    width: 120px;
    height: 6px;

    opacity: 0;
    pointer-events: none;

    transition:
      opacity 0.2s ease,
      transform 0.2s ease;

    accent-color: white;
  }

  #volumeWrapper:hover #volumeSlider,
  #volumeWrapper:focus-within #volumeSlider {
    opacity: 1;
    pointer-events: auto;

    transform:
      translateX(-50%)
      rotate(-90deg)
      scale(1);
  }

  @media (hover: none) {
    #volumeSlider {
      opacity: 1;
      pointer-events: auto;
    }
  }

  #rotateOverlay {
    display: none;
    position: fixed;
    z-index: 200;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    gap: 20px;
  }

  #rotateOverlay .rotate-icon {
    font-size: clamp(48px, 12vw, 80px);
    animation: rotateAnim 2s ease-in-out infinite;
  }

  #rotateOverlay p {
    font-size: clamp(16px, 5vw, 24px);
    margin: 0;
    max-width: 320px;
    line-height: 1.4;
  }

  @keyframes rotateAnim {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }

  @media (hover: none) and (orientation: portrait) {
    #rotateOverlay {
      display: flex;
    }
  }
</style>
</head>

<body>

<div id="rotateOverlay">
  <div class="rotate-icon">📱</div>
  <p>Por favor, gira tu dispositivo para una mejor experiencia</p>
</div>

<video id="video" muted playsinline></video>

<div id="startScreen">
  <button onclick="start()">Iniciar</button>
</div>

<div class="overlay">
  <div class="buttons" id="options">
    <button onclick="playVideo('Rough_Agite.mp4')">Agité</button>
    <button onclick="playVideo('Rough_OFicinaCentral.mp4')">Oficina</button>
    <button onclick="playVideo('Rough_PequenoTeatro.mp4')">Teatro</button>
  </div>

  <button id="finalButton" onclick="goToLink()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12.75 2h2.25c.2 1.9 1.7 3.4 3.6 3.6v2.3c-1.3-.1-2.5-.5-3.6-1.2v7.4c0 3.2-2.6 5.8-5.8 5.8s-5.8-2.6-5.8-5.8 2.6-5.8 5.8-5.8c.3 0 .6 0 .9.1v2.4c-.3-.1-.6-.2-.9-.2-1.9 0-3.4 1.5-3.4 3.4s1.5 3.4 3.4 3.4 3.4-1.5 3.4-3.4V2z"/>
    </svg>
    Tik Tok
  </button>

  <button id="restartFlowButton" onclick="restartFlow()">Reiniciar</button>
</div>

<div id="controls">
  <button onclick="restartVideo()">⏮</button>
  <button onclick="togglePlay()">⏯</button>
  <button id="skipBtn" onclick="skip()">⏭</button>
</div>

<!-- NUEVO CONTROL VOLUMEN -->
<div id="volumeControl">
  <div id="volumeWrapper">

    <input
      type="range"
      id="volumeSlider"
      min="0"
      max="1"
      step="0.05"
      value="1"
      oninput="setVolume(this.value)"
    >

    <button id="muteBtn" onclick="toggleMute()">🔊</button>

  </div>
</div>

<script>
  const video             = document.getElementById("video");
  const options           = document.getElementById("options");
  const finalButton       = document.getElementById("finalButton");
  const restartFlowButton = document.getElementById("restartFlowButton");
  const startScreen       = document.getElementById("startScreen");
  const skipBtn           = document.getElementById("skipBtn");
  const volumeControl     = document.getElementById("volumeControl");
  const muteBtn           = document.getElementById("muteBtn");
  const volumeSlider      = document.getElementById("volumeSlider");
  const rotateOverlay     = document.getElementById("rotateOverlay");

  let isIntro = true;
  let introCompleted = false;
  let skipping = false;

  function checkOrientation() {
    const portrait = window.innerHeight > window.innerWidth;
    const touch = "ontouchstart" in window || navigator.maxTouchPoints > 0;

    rotateOverlay.style.display =
      (portrait && touch) ? "flex" : "none";
  }

  window.addEventListener("resize", checkOrientation);
  window.addEventListener("orientationchange", checkOrientation);

  checkOrientation();

  function start() {
    startScreen.style.display = "none";

    video.muted = false;
    video.volume = 1;

    volumeControl.style.display = "block";

    loadVideo("Color_Intro_TODO.mp4", true);
  }

  function loadVideo(src, intro = false) {
    isIntro = intro;
    introCompleted = false;

    video.pause();
    video.src = src;
    video.load();

    setTimeout(() => {
      video.currentTime = 0;
      video.play().catch(() => {});
    }, 100);
  }

  video.addEventListener("ended", () => {
    if (skipping) return;

    if (isIntro) {
      introCompleted = true;
      skipBtn.style.display = "none";
      options.style.display = "flex";
    } else {
      skipBtn.style.display = "none";
      finalButton.style.display = "flex";
      restartFlowButton.style.display = "block";
    }
  });

  function playVideo(src) {
    options.style.display = "none";
    finalButton.style.display = "none";
    restartFlowButton.style.display = "none";

    skipBtn.style.display = "block";

    loadVideo(src, false);
  }

  function togglePlay() {
    if (!video.src) return;

    if (video.paused) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  }

  function restartVideo() {
    if (!video.src) return;

    options.style.display = "none";
    finalButton.style.display = "none";
    restartFlowButton.style.display = "none";

    skipBtn.style.display = "block";

    if (isIntro) {
      introCompleted = false;
    }

    video.currentTime = 0;

    video.play().catch(() => {});
  }

  function skip() {
    if (isIntro && !introCompleted) {

      skipping = true;
      introCompleted = true;

      video.pause();

      if (video.duration && isFinite(video.duration)) {
        video.currentTime = video.duration;
      }

      skipBtn.style.display = "none";
      options.style.display = "flex";

      setTimeout(() => {
        skipping = false;
      }, 300);

    } else if (!isIntro) {

      skipping = true;

      video.pause();

      if (video.duration && isFinite(video.duration)) {
        video.currentTime = video.duration;
      }

      skipBtn.style.display = "none";
      finalButton.style.display = "flex";
      restartFlowButton.style.display = "block";

      setTimeout(() => {
        skipping = false;
      }, 300);
    }
  }

  function restartFlow() {
    options.style.display = "none";
    finalButton.style.display = "none";
    restartFlowButton.style.display = "none";

    skipBtn.style.display = "block";

    isIntro = true;
    introCompleted = false;

    loadVideo("Color_Intro_TODO.mp4", true);
  }

  function goToLink() {
    window.open(
      "https://www.tiktok.com/@escenas_inhabitadas?_r=1&_t=ZS-95hnxZTzgVZ",
      "_blank"
    );
  }

  function toggleMute() {
    video.muted = !video.muted;

    muteBtn.textContent =
      video.muted ? "🔇" : "🔊";

    if (!video.muted) {
      volumeSlider.value = video.volume;
    }
  }

  function setVolume(val) {
    const v = parseFloat(val);

    video.volume = v;
    video.muted = v === 0;

    muteBtn.textContent =
      v === 0 ? "🔇" : "🔊";
  }
</script>

</body>
</html>
