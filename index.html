<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Video Interactivo</title>

<style>

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
  font-family:Arial,sans-serif;
}

/* =========================
   APP
========================= */

.app{
  position:fixed;
  inset:0;

  width:100%;
  height:100%;

  overflow:hidden;

  background:black;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* =========================
   VIDEO FRAME
========================= */

#videoFrame{
  width:min(90%,calc(93dvh * 16 / 9));
  aspect-ratio:16/9;

  background:white;
  /* padding fino para los vídeos normales */
  padding:clamp(10px,1.4vw,20px) clamp(18px,2.5vw,36px);

  flex-shrink:0;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* Borde grueso para el intro */
#videoFrame.is-intro{
  padding:clamp(18px,2.5vw,40px) clamp(32px,4.45vw,72px);
}

/* Zoom intro para ocultar sus márgenes blancos de contenido */
#videoFrame.is-intro video{
  transform:scale(1.3);
}

/* =========================
   VIDEO
========================= */

video{
  width:100%;
  height:100%;

  object-fit:contain;

  background:white;

  /* línea separadora para que el borde sea visible en contenido gris claro */
  outline:1px solid rgba(0,0,0,0.12);
  outline-offset:-1px;

  transition:transform 0.3s ease;
}

/* =========================
   MOBILE PORTRAIT
   ROTAR TODA LA INTERFAZ
========================= */

@media (hover:none) and (orientation:portrait){

  body{
    overflow:hidden;
  }

  .app{

    width:100vh;
    height:100vw;

    top:50%;
    left:50%;

    transform:
      translate(-50%, -50%)
      rotate(90deg);

    transform-origin:center center;
  }
}

/* =========================
   OVERLAY
========================= */

.overlay{
  position:fixed;
  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  pointer-events:none;

  z-index:2;
}

/* =========================
   BOTONES OPCIONES
========================= */

.buttons{
  display:none;

  gap:clamp(10px,2vw,22px);

  pointer-events:all;

  flex-wrap:wrap;
  justify-content:center;

  padding:0 clamp(10px,4vw,40px);

  max-width:100%;
}

/* =========================
   ESTILO GENERAL BOTONES
========================= */

button{
  position:relative;
  overflow:hidden;

  padding:
    clamp(10px,1.6vh,14px)
    clamp(16px,2.5vw,28px);

  font-size:clamp(13px,2vw,16px);
  font-weight:600;
  letter-spacing:0.4px;

  border-radius:16px;
  border:1px solid rgba(255,255,255,0.18);

  cursor:pointer;

  color:white;

  background:
    linear-gradient(
      180deg,
      rgba(40,40,40,0.92),
      rgba(12,12,12,0.88)
    );

  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);

  box-shadow:
    0 8px 28px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.05);

  transition:
    transform 0.18s ease,
    background 0.18s ease,
    box-shadow 0.18s ease,
    border-color 0.18s ease;
}

button::before{
  content:"";

  position:absolute;
  inset:0;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.05),
      rgba(255,255,255,0)
    );

  pointer-events:none;
}

button:hover{
  transform:translateY(-2px) scale(1.03);

  background:
    linear-gradient(
      180deg,
      rgba(55,55,55,0.96),
      rgba(20,20,20,0.92)
    );

  border-color:rgba(255,255,255,0.24);

  box-shadow:
    0 12px 34px rgba(0,0,0,0.55),
    0 0 18px rgba(255,255,255,0.05);
}

button:active{
  transform:scale(0.98);
}

/* =========================
   BOTONES OPCIONES
========================= */

.buttons button{
  min-width:clamp(90px,13vw,150px);

  padding:
    clamp(12px,2vh,18px)
    clamp(20px,3vw,36px);

  font-size:clamp(14px,2.2vw,18px);

  border-radius:20px;
}

/* =========================
   START SCREEN
========================= */

#startScreen{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.75);

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:5;
}

#startScreen button{
  padding:
    clamp(14px,2vh,20px)
    clamp(34px,5vw,58px);

  font-size:clamp(17px,3vw,24px);

  border-radius:22px;
}

/* =========================
   CONTROLES VIDEO
========================= */

#controls{
  position:fixed;

  bottom:clamp(45px,6vh,75px);
  left:clamp(100px,10vw,160px);

  z-index:3;

  display:flex;
  gap:10px;
}

#controls button{
  width:48px;
  height:48px;

  padding:0;

  border-radius:50%;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:18px;
}

/* =========================
   VOLUMEN
========================= */

#volumeControl{
  position:fixed;

  bottom:clamp(45px,6vh,75px);
  right:clamp(100px,10vw,160px);

  z-index:50;

  display:none;
}

#volumeWrapper{
  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;
}

#muteBtn{
  width:50px;
  height:50px;

  border-radius:50%;
  padding:0;

  font-size:18px;
}

#volumeSlider{
  position:absolute;

  bottom:78px;
  left:50%;

  transform:
    translateX(-50%)
    rotate(-90deg);

  width:120px;
  height:6px;

  opacity:0;
  pointer-events:none;

  accent-color:white;

  transition:
    opacity 0.2s ease,
    transform 0.2s ease;
}

#volumeWrapper:hover #volumeSlider,
#volumeWrapper:focus-within #volumeSlider{
  opacity:1;
  pointer-events:auto;

  transform:
    translateX(-50%)
    rotate(-90deg)
    scale(1);
}

@media (hover:none){
  #volumeSlider{
    opacity:1;
    pointer-events:auto;
  }
}

/* =========================
   BOTONES FINALES
========================= */

#finalButtonsContainer{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:12px;
  pointer-events:all;
}

#finalButton,
#restartFlowButton,
#backToOptionsButton{
  width:clamp(160px,22vw,220px);
  height:clamp(44px,6vh,56px);

  padding:0;

  border-radius:40px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:clamp(13px,1.8vw,15px);
  font-weight:700;
  letter-spacing:0.3px;

  color:white;

  background:
    linear-gradient(
      180deg,
      rgba(15,15,15,0.92),
      rgba(0,0,0,0.82)
    );

  border:1px solid rgba(255,255,255,0.14);

  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);

  box-shadow:
    0 12px 32px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.04);
}

#finalButton:hover,
#restartFlowButton:hover,
#backToOptionsButton:hover{
  transform:translateY(-4px) scale(1.06);

  background:
    linear-gradient(
      180deg,
      rgba(25,25,25,0.96),
      rgba(10,10,10,0.90)
    );

  border-color:rgba(255,255,255,0.22);
}

/* =========================
   MOBILE
========================= */

@media (max-width:600px){

  #controls button,
  #muteBtn{
    width:44px;
    height:44px;
    font-size:16px;
  }

  .buttons{
    gap:12px;
  }

  #finalButton,
  #restartFlowButton,
  #backToOptionsButton{
    width:clamp(140px,40vw,180px);
    height:clamp(40px,5vh,48px);
    font-size:12px;
  }
}

</style>
</head>

<body>

<div class="app">

  <!-- VIDEO -->
  <div id="videoFrame">
    <video
      id="video"
      muted
      playsinline
    ></video>
  </div>

  <!-- START -->
  <div id="startScreen">

    <button onclick="start()">
      Iniciar
    </button>

  </div>

  <!-- OVERLAY -->
  <div class="overlay">

    <!-- OPCIONES -->
    <div class="buttons" id="options">

      <button onclick="playVideo('Rough_Agite.mp4')">
        Teatro Agité
      </button>

      <button onclick="playVideo('Rough_OFicinaCentral.mp4')">
        Teatro Oficina Central de los Sueños
      </button>

      <button onclick="playVideo('Rough_PequenoTeatro.mp4')">
        Pequeño Teatro
      </button>

    </div>

    <!-- BOTONES FINALES -->
    <div id="finalButtonsContainer">

      <button
        id="finalButton"
        onclick="playCredits()"
        aria-label="Créditos"
      >
        Créditos
      </button>

      <button
        id="restartFlowButton"
        onclick="restartFlow()"
        aria-label="Volver al inicio"
      >
        Volver al inicio
      </button>

      <button
        id="backToOptionsButton"
        onclick="goToOptions()"
      >
        Volver a opciones
      </button>

    </div>

  </div>

  <!-- CONTROLES -->
  <div id="controls">

    <button onclick="restartVideo()">
      ⏮
    </button>

    <button onclick="togglePlay()">
      ⏯
    </button>

    <button
      id="skipBtn"
      onclick="skip()"
    >
      ⏭
    </button>

  </div>

  <!-- VOLUMEN -->
  <div id="volumeControl">

    <div id="volumeWrapper">

      <input
        type="range"
        id="volumeSlider"
        min="0"
        max="1"
        step="0.05"
        value="1"
        oninput="setVolume(this.value)"
      >

      <button
        id="muteBtn"
        onclick="toggleMute()"
      >
        🔊
      </button>

    </div>

  </div>

</div>

<script>

const video =
  document.getElementById("video");

const options =
  document.getElementById("options");

const finalButtonsContainer =
  document.getElementById("finalButtonsContainer");

const videoFrame =
  document.getElementById("videoFrame");

const startScreen =
  document.getElementById("startScreen");

const skipBtn =
  document.getElementById("skipBtn");

const volumeControl =
  document.getElementById("volumeControl");

const muteBtn =
  document.getElementById("muteBtn");

const volumeSlider =
  document.getElementById("volumeSlider");

let isIntro = true;
let introCompleted = false;
let skipping = false;

/* =========================
   START
========================= */

function start(){

  startScreen.style.display = "none";

  video.muted = false;
  video.volume = 1;

  volumeControl.style.display = "block";

  loadVideo(
    "Color_Intro_TODO.mp4",
    true
  );
}

/* =========================
   LOAD VIDEO
========================= */

function loadVideo(src, intro = false){

  isIntro = intro;
  introCompleted = false;

  if(intro){
    videoFrame.classList.add("is-intro");
  }else{
    videoFrame.classList.remove("is-intro");
  }

  video.pause();

  video.src = src;

  video.load();

  setTimeout(() => {

    video.currentTime = 0;

    video.play().catch(() => {});

  },100);
}

/* =========================
   TIMEUPDATE — opciones a los 51 s del intro
========================= */

video.addEventListener("timeupdate", () => {
  if(isIntro && video.currentTime >= 51 &&
     options.style.display !== "flex"){
    options.style.display = "flex";
  }
});

/* =========================
   VIDEO END
========================= */

video.addEventListener("ended", () => {

  if(skipping) return;

  if(isIntro){

    introCompleted = true;

    skipBtn.style.display = "none";

    options.style.display = "flex";

  }else{

    skipBtn.style.display = "none";

    finalButtonsContainer.style.display =
      "flex";
  }
});

/* =========================
   PLAY OPTION
========================= */

function playVideo(src){

  options.style.display = "none";

  finalButtonsContainer.style.display =
    "none";

  skipBtn.style.display = "block";

  loadVideo(src,false);
}

/* =========================
   PLAY / PAUSE
========================= */

function togglePlay(){

  if(!video.src) return;

  if(video.paused){

    video.play().catch(() => {});

  }else{

    video.pause();
  }
}

/* =========================
   RESTART VIDEO
========================= */

function restartVideo(){

  if(!video.src) return;

  options.style.display = "none";

  finalButtonsContainer.style.display =
    "none";

  skipBtn.style.display = "block";

  if(isIntro){
    introCompleted = false;
  }

  video.currentTime = 0;

  video.play().catch(() => {});
}

/* =========================
   SKIP
========================= */

function skip(){

  if(isIntro && !introCompleted){

    skipping = true;

    introCompleted = true;

    video.pause();

    if(video.duration &&
       isFinite(video.duration)){

      video.currentTime =
        video.duration;
    }

    skipBtn.style.display = "none";

    options.style.display = "flex";

    setTimeout(() => {
      skipping = false;
    },300);

  }else if(!isIntro){

    skipping = true;

    video.pause();

    if(video.duration &&
       isFinite(video.duration)){

      video.currentTime =
        video.duration;
    }

    skipBtn.style.display = "none";

    finalButtonsContainer.style.display =
      "flex";

    setTimeout(() => {
      skipping = false;
    },300);
  }
}

/* =========================
   RESTART FLOW
========================= */

function restartFlow(){

  options.style.display = "none";

  finalButtonsContainer.style.display =
    "none";

  skipBtn.style.display = "block";

  isIntro = true;

  introCompleted = false;

  loadVideo(
    "Color_Intro_TODO.mp4",
    true
  );
}

/* =========================
   CRÉDITOS
========================= */

function playCredits(){
  playVideo("Rough_OFicinaCentral.mp4");
}

/* =========================
   VOLVER A OPCIONES
========================= */

function goToOptions(){

  finalButtonsContainer.style.display =
    "none";

  skipBtn.style.display = "none";

  video.pause();

  options.style.display = "flex";
}

/* =========================
   VOLUME
========================= */

function toggleMute(){

  video.muted = !video.muted;

  muteBtn.textContent =
    video.muted
    ? "🔇"
    : "🔊";

  if(!video.muted){
    volumeSlider.value =
      video.volume;
  }
}

function setVolume(val){

  const v = parseFloat(val);

  video.volume = v;

  video.muted = v === 0;

  muteBtn.textContent =
    v === 0
    ? "🔇"
    : "🔊";
}

</script>

</body>
</html>
